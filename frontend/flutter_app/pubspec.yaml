name: smart_assistant
description: AI-powered personal task assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  
  # State Management
  provider: ^6.1.1
  
  # Network & API
  http: ^1.2.0
  dio: ^5.4.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Charts & Visualization
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^24.2.9
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Icons & Assets
  flutter_svg: ^2.0.10
  
  #Voice input
  speech_to_text: ^6.6.0
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  
  # Animations
  lottie: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Bold.ttf
          weight: 700